<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/admin-layout :: view(~{::title}, ~{::article})}">

<head>
    <title>Tổng quan - Admin</title>
</head>

<body>
    <article>
        <!-- ===== STATS CARDS ===== -->
        <div class="row g-4 mb-4">

            <!-- Doanh thu tháng -->
            <div class="col-md-4">
                <div class="stat-card">
                    <div>
                        <h6 class="text-muted small fw-bold text-uppercase mb-1">Doanh thu tháng</h6>
                        <h3 class="fw-bold mb-0" style="font-size: 1.3rem;" th:text="${monthlyRevenue >= 1000000000
                                ? #numbers.formatDecimal(monthlyRevenue / 1000000000.0, 1, 'POINT', 1, 'COMMA') + ' tỷ ₫'
                                : (monthlyRevenue >= 1000000
                                    ? #numbers.formatDecimal(monthlyRevenue / 1000000.0, 1, 'POINT', 1, 'COMMA') + ' tr ₫'
                                    : #numbers.formatInteger(monthlyRevenue, 3, 'POINT') + ' ₫')}">0 ₫
                        </h3>
                        <span th:if="${revenueGrowth != null}"
                            th:class="${revenueGrowth >= 0 ? 'badge bg-success-subtle text-success' : 'badge bg-danger-subtle text-danger'}"
                            style="font-size: 0.75rem;">
                            <i th:class="${revenueGrowth >= 0 ? 'fas fa-arrow-up' : 'fas fa-arrow-down'}"></i>
                            <span
                                th:text="${#numbers.formatDecimal(revenueGrowth, 1, 'POINT', 1, 'COMMA') + '% so T.trước'}"></span>
                        </span>
                        <small class="text-muted d-block" style="font-size: 0.7rem;"
                            th:text="${#numbers.formatInteger(monthlyRevenue, 3, 'POINT') + ' ₫'}"></small>
                    </div>
                    <div class="icon-box bg-primary-soft"><i class="fas fa-hand-holding-usd"></i></div>
                </div>
            </div>

            <!-- Khách hàng -->
            <div class="col-md-4">
                <div class="stat-card">
                    <div>
                        <h6 class="text-muted small fw-bold text-uppercase mb-1">Khách hàng</h6>
                        <h3 class="fw-bold mb-0"
                            th:text="${totalCustomers >= 1000 ? #numbers.formatDecimal(totalCustomers/1000, 0, 'COMMA', 1, 'POINT')+'k' : totalCustomers}">
                            0</h3>
                    </div>
                    <div class="icon-box bg-warning-soft"><i class="fas fa-user-plus"></i></div>
                </div>
            </div>

            <!-- Sản phẩm -->
            <div class="col-md-4">
                <div class="stat-card">
                    <div>
                        <h6 class="text-muted small fw-bold text-uppercase mb-1">Sản phẩm</h6>
                        <h3 class="fw-bold mb-0" th:text="${totalProducts}">0</h3>
                    </div>
                    <div class="icon-box bg-danger-soft"><i class="fas fa-box"></i></div>
                </div>
            </div>
        </div>

        <!-- ===== CHART + ORDER STATUS PANEL ===== -->
        <div class="row">
            <!-- Revenue Chart -->
            <div class="col-lg-8 mb-4">
                <div class="card-box h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0">Phân tích doanh thu</h5>
                        <select id="revenuePeriodSelect" class="form-select form-select-sm w-auto border-0 bg-light">
                            <option value="day">Hôm nay</option>
                            <option value="week">Tuần này</option>
                            <option value="month" selected>Tháng này</option>
                            <option value="year">Năm nay</option>
                        </select>
                    </div>
                    <canvas id="revenueChart" height="150"></canvas>
                </div>
            </div>

            <!-- Order Status Panel -->
            <div class="col-lg-4 mb-4">
                <div class="card-box h-100">
                    <h5 class="fw-bold mb-4">
                        <i class="fas fa-tasks me-2 text-secondary"></i>Trạng thái đơn
                    </h5>

                    <div th:if="${orderStatsByStatus != null}" class="mb-4">
                        <div
                            class="d-flex justify-content-between align-items-center mb-2 p-2 rounded bg-warning-subtle">
                            <span class="small"><i class="fas fa-clock me-1 text-warning"></i>Chờ xử lý</span>
                            <span class="badge bg-warning text-dark" th:text="${orderStatsByStatus['PENDING']}">0</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-2 p-2 rounded bg-info-subtle">
                            <span class="small"><i class="fas fa-check me-1 text-info"></i>Đã xác nhận</span>
                            <span class="badge bg-info text-dark" th:text="${orderStatsByStatus['CONFIRMED']}">0</span>
                        </div>
                        <div
                            class="d-flex justify-content-between align-items-center mb-2 p-2 rounded bg-primary-subtle">
                            <span class="small"><i class="fas fa-truck me-1 text-primary"></i>Đang giao</span>
                            <span class="badge bg-primary" th:text="${orderStatsByStatus['SHIPPING']}">0</span>
                        </div>
                        <div
                            class="d-flex justify-content-between align-items-center mb-2 p-2 rounded bg-success-subtle">
                            <span class="small"><i class="fas fa-check-circle me-1 text-success"></i>Hoàn thành</span>
                            <span class="badge bg-success" th:text="${orderStatsByStatus['COMPLETED']}">0</span>
                        </div>
                        <div
                            class="d-flex justify-content-between align-items-center mb-2 p-2 rounded bg-danger-subtle">
                            <span class="small"><i class="fas fa-times-circle me-1 text-danger"></i>Đã huỷ</span>
                            <span class="badge bg-danger" th:text="${orderStatsByStatus['CANCELLED']}">0</span>
                        </div>
                    </div>

                    <a href="/admin/orders" class="btn btn-sm btn-outline-secondary w-100 mt-auto">
                        <i class="fas fa-list me-1"></i> Xem tất cả đơn hàng
                    </a>
                </div>
            </div>
        </div>

        <!-- ===== TOP PRODUCTS ===== -->
        <div class="row mb-4" th:if="${topProducts != null and !topProducts.isEmpty()}">
            <div class="col-12">
                <div class="card-box">
                    <h5 class="fw-bold mb-4">
                        <i class="fas fa-trophy me-2 text-warning"></i>
                        Top sản phẩm bán chạy – Tháng này
                        <small class="text-muted fw-normal" style="font-size: 0.75rem;">(từ đơn hoàn thành)</small>
                    </h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 40px;">#</th>
                                    <th>Sản phẩm</th>
                                    <th class="text-center">Số lượng đã bán</th>
                                    <th class="text-end">Doanh thu</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="product, stat : ${topProducts}">
                                    <td>
                                        <span th:if="${stat.index == 0}" class="badge bg-warning text-dark">🥇</span>
                                        <span th:if="${stat.index == 1}" class="badge bg-secondary">🥈</span>
                                        <span th:if="${stat.index == 2}" class="badge bg-danger">🥉</span>
                                        <span th:if="${stat.index >= 3}" class="text-muted"
                                            th:text="${stat.index + 1}"></span>
                                    </td>
                                    <td>
                                        <span class="fw-semibold" th:text="${product['productName']}">-</span>
                                    </td>
                                    <td class="text-center">
                                        <span class="badge bg-primary-subtle text-primary"
                                            th:text="${product['totalSold']} + ' đôi'">0 đôi</span>
                                    </td>
                                    <td class="text-end fw-bold text-success"
                                        th:text="${#numbers.formatInteger(product['totalRevenue'], 3, 'POINT') + ' ₫'}">
                                        0 ₫</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart initialization -->
        <script th:inline="javascript">
            document.addEventListener("DOMContentLoaded", function () {
                const chartData = /*[[${revenueChartData}]]*/[];
                initRevenueChart(chartData);
            });
        </script>
    </article>
</body>

</html>
