<!-- Guest Welcome Banner -->
<div th:fragment="guestBanner" class="alert alert-dismissible fade show mb-0"
    style="background-color: #000; border: 1px solid #222; border-radius: 0; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1);"
    sec:authorize="isAnonymous()">
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
    <div class="d-flex align-items-center flex-column flex-md-row text-center text-md-start p-2 p-md-3">
        <div class="me-md-4 mb-3 mb-md-0" style="font-size: 2.5rem; color: #fff;">
            <i class="fas fa-crown"></i>
        </div>
        <div class="flex-grow-1">
            <h5 class="fw-bold mb-2 text-uppercase" style="letter-spacing: 2px;">
                Đặc Quyền Thành Viên
            </h5>
            <p class="mb-3 mb-md-0 text-light" style="font-size: 0.95rem;">
                Đăng ký thành viên ngay để nhận ưu đãi <strong>giảm 20%</strong> cho đơn hàng đầu tiên và nhiều quà tặng
                độc quyền từ ShopOMG.
            </p>
        </div>
        <div class="d-flex gap-4 mt-3 mt-md-0 ms-md-auto align-items-center">
            <a th:href="@{/login}" class="text-white text-decoration-none fw-bold small text-uppercase"
                style="letter-spacing: 1px;">
                Đăng nhập
            </a>
            <a th:href="@{/register}" class="btn btn-light fw-bold px-4 py-2 rounded-0 text-uppercase"
                style="letter-spacing: 1px;">
                Đăng ký ngay
            </a>
        </div>
    </div>
</div>
