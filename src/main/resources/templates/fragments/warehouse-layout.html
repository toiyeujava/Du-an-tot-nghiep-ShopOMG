<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="view(title, content)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}" />
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}" />
    <title th:replace="${title}">Kho hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
    <link rel="stylesheet" th:href="@{/css/warehouse/warehouse.css}">
    <style>
        /* ── SPA Content Transition ───────────────────────────── */
        #wh-main-content {
            transition: opacity .18s ease, transform .18s ease;
        }

        #wh-main-content.wh-fade-out {
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
        }

        /* ── Sidebar SPA active state ─────────────────────────── */
        .admin-menu a[data-wh-tab] {
            cursor: pointer;
        }

        .admin-menu a[data-wh-tab].active {
            background: rgba(245, 158, 11, .13);
            color: #d97706 !important;
            font-weight: 700;
        }

        .admin-menu a[data-wh-tab].active i {
            color: #d97706 !important;
        }
    </style>
</head>

<body>

    <div class="admin-sidebar">
        <a href="/" class="sidebar-brand text-decoration-none">
            <i class="fas fa-warehouse text-warning me-2"></i> SHOP OMG!
        </a>

        <div class="admin-menu">

            <!-- TỔNG QUAN -->
            <small class="text-uppercase text-muted fw-bold ms-3 mb-2 d-block"
                style="font-size:.7rem;letter-spacing:1px;">Tổng quan</small>

            <a href="#" data-wh-tab="tab-dashboard" data-wh-title="Dashboard – Kho hàng" class="wh-nav-link active">
                <i class="fas fa-th-large"></i> Dashboard
            </a>

            <!-- QUẢN LÝ TỒN KHO -->
            <small class="text-uppercase text-muted fw-bold ms-3 mb-2 mt-4 d-block"
                style="font-size:.7rem;letter-spacing:1px;">Quản lý tồn kho</small>

            <a href="#" data-wh-tab="tab-inventory" data-wh-title="Danh sách tồn kho" class="wh-nav-link">
                <i class="fas fa-boxes"></i> Danh sách tồn kho
            </a>

            <a href="#" data-wh-tab="tab-alerts" data-wh-title="Cảnh báo hết hàng" class="wh-nav-link">
                <i class="fas fa-exclamation-triangle text-warning"></i> Cảnh báo hết hàng
                <span th:if="${lowStockCount != null and lowStockCount > 0}" class="badge bg-danger ms-auto"
                    th:text="${lowStockCount}">0</span>
            </a>

            <!-- NHẬP / XUẤT KHO -->
            <small class="text-uppercase text-muted fw-bold ms-3 mb-2 mt-4 d-block"
                style="font-size:.7rem;letter-spacing:1px;">Nhập / Xuất kho</small>

            <a href="#" data-wh-tab="tab-log" data-wh-title="Log nhập / xuất kho" class="wh-nav-link">
                <i class="fas fa-clipboard-list"></i> Log nhập/xuất
            </a>


            <form th:action="@{/logout}" method="post" class="mt-4 ms-3 mb-2 d-block">
                <button type="submit"
                    class="btn btn-link text-danger text-decoration-none p-0 d-flex align-items-center">
                    <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
                </button>
            </form>
        </div>
    </div>

    <!-- ── Main content area ──────────────────────────────────── -->
    <div class="admin-content">

        <!-- Page header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-0 text-dark" id="wh-page-title" th:text="${pageTitle}">Kho hàng</h4>
                <small class="text-muted">
                    Xin chào,
                    <strong th:text="${currentAccount?.fullName ?: 'Nhân viên kho'}">Nhân viên kho</strong>!
                </small>
            </div>
            <div class="d-flex align-items-center bg-white p-2 rounded-pill shadow-sm">
                <img th:src="${currentAccount?.avatar != null
                              ? currentAccount.avatar
                              : 'https://ui-avatars.com/api/?background=F59E0B&color=fff&name=Kho'}"
                    class="rounded-circle" width="35" height="35" style="object-fit:cover;"
                    th:alt="${currentAccount?.fullName ?: 'Warehouse Staff'}">
                <span class="fw-bold ms-2 me-3 small" th:text="${currentAccount?.fullName ?: 'Nhân viên kho'}">Nhân viên
                    kho</span>
                <span class="badge bg-warning-subtle text-warning small">
                    <i class="fas fa-warehouse me-1"></i>Kho hàng
                </span>
            </div>
        </div>

        <!-- Swappable content zone -->
        <div id="wh-main-content">
            <div th:replace="${content}"></div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script th:src="@{/js/admin/admin.js}"></script>
    <script th:src="@{/js/warehouse/warehouse.js}"></script>
</body>

</html>
