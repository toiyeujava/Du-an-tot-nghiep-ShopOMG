<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: view(~{::title}, ~{::article})}">
<head>
    <title>Hồ sơ của tôi - ShopOMG</title>
</head>
<body>
    <article class="container py-5">
        <div class="row">
            <div class="col-lg-3 mb-4">
                <div th:replace="~{fragments/account-sidebar :: sidebar('profile')}"></div>
            </div>

            <div class="col-lg-9">
                <div class="card-box">
                    <ul class="nav nav-tabs mb-4" id="profileTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold text-dark" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button" role="tab" aria-controls="profile" aria-selected="true">Hồ sơ của tôi</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold text-dark" id="voucher-tab" data-bs-toggle="tab" data-bs-target="#voucher" type="button" role="tab" aria-controls="voucher" aria-selected="false">Ví Voucher</button>
                        </li>
                    </ul>
                    
                    <div class="tab-content" id="profileTabsContent">
                        <div class="tab-pane fade show active" id="profile" role="tabpanel" aria-labelledby="profile-tab">
                            <p class="text-muted small mb-4">Quản lý thông tin hồ sơ để bảo mật tài khoản</p>
                    
                    <form th:action="@{/account/update}" method="post" enctype="multipart/form-data" th:object="${profileForm}">

                        <div th:if="${success}" class="alert alert-success mb-4" th:text="${success}"></div>

                        <div class="row">
                            <div class="col-md-8 pe-md-5 order-2 order-md-1">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-muted">Tên đăng nhập</label>
                                    <input type="text" class="form-control bg-light" th:value="*{username}" disabled>
                                    <div class="form-text small">Tên đăng nhập không thể thay đổi.</div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-muted">Họ và tên</label>
                                    <input type="text" class="form-control" th:field="*{fullName}">
                                    <small th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-danger"></small>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-muted">Email</label>
                                    <input type="email" class="form-control bg-light" th:field="*{email}" disabled>
                                    <div class="form-text small">Email dùng để đăng nhập và khôi phục mật khẩu.</div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-muted">Số điện thoại</label>
                                    <input type="tel" class="form-control" th:field="*{phone}" placeholder="Nhập số điện thoại...">
                                    <small th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-danger"></small>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label small fw-bold text-muted">Ngày sinh</label>
                                        <input type="date" class="form-control" th:field="*{birthDate}">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label small fw-bold text-muted">Giới tính</label>
                                        <div class="d-flex align-items-center mt-2">
                                            <div class="form-check me-3">
                                                <input class="form-check-input" type="radio" th:field="*{gender}" value="MALE" id="g1">
                                                <label class="form-check-label" for="g1">Nam</label>
                                            </div>
                                            <div class="form-check me-3">
                                                <input class="form-check-input" type="radio" th:field="*{gender}" value="FEMALE" id="g2">
                                                <label class="form-check-label" for="g2">Nữ</label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" th:field="*{gender}" value="OTHER" id="g3">
                                                <label class="form-check-label" for="g3">Khác</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <button class="btn btn-dark fw-bold px-4 mt-3">Lưu thay đổi</button>
                            </div>

                            <div class="col-md-4 text-center ps-md-4 border-start order-1 order-md-2 mb-4 mb-md-0">
                                <div class="profile-avatar-container">
                                    <img id="avatarPreview" th:src="*{avatarUrl} ?: 'https://i.pravatar.cc/150?img=12'" class="profile-avatar-img" onerror="this.src='https://i.pravatar.cc/150?img=12'">
                                    
                                    <label for="avatarInput" class="avatar-upload-btn">
                                        <i class="fas fa-camera small"></i>
                                    </label>
                                    
                                    <input type="file" id="avatarInput" name="avatarFile" hidden accept="image/*" onchange="previewImage(this)">

                                </div>
                                <div class="small text-muted">
                                    Dụng lượng file tối đa 1 MB<br>
                                    Định dạng: .JPEG, .PNG
                                </div>
                            </div>
                        </div>
                        </div>
                    </form>
                        </div>
                        
                        <!-- VOUCHER WALLET TAB -->
                        <div class="tab-pane fade" id="voucher" role="tabpanel" aria-labelledby="voucher-tab">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <p class="text-muted small mb-0">Lưu trữ và quản lý các mã giảm giá của bạn</p>
                            </div>
                            
                            <div th:if="${vouchers == null or vouchers.empty}" class="alert alert-secondary text-center py-5">
                                <i class="fas fa-ticket-alt fs-1 text-muted mx-auto d-block mb-3"></i>
                                Hiện chưa có mã giảm giá nào khả dụng
                            </div>

                            <div th:if="${vouchers != null and !vouchers.empty}" class="row g-3">
                                <div class="col-md-6" th:each="v : ${vouchers}">
                                    <div class="card border-1 border-secondary h-100 position-relative voucher-card" style="border-radius: 8px; overflow: hidden; border-style: dashed !important;">
                                        <div class="row g-0 h-100">
                                            <div class="col-4 bg-dark text-white d-flex flex-column align-items-center justify-content-center p-2 text-center" style="border-right: 2px dashed #ccc;">
                                                <i class="fas fa-ticket-alt fs-2 mb-2"></i>
                                                <span class="fw-bold fs-5" th:text="${v.discountPercent != null and v.discountPercent > 0 ? v.discountPercent + '%' : #numbers.formatDecimal(v.discountAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}">20%</span>
                                            </div>
                                            <div class="col-8 p-3 d-flex flex-column justify-content-between">
                                                <div>
                                                    <h6 class="fw-bold mb-1" th:text="${v.code}">CODE</h6>
                                                    <p class="small text-muted mb-1" th:text="${'Đơn tối thiểu: ' + #numbers.formatDecimal(v.minOrderAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}">Min</p>
                                                    <p class="small text-danger mb-0 fw-bold" th:text="${'HSD: ' + #temporals.format(v.endDate, 'dd/MM/yyyy')}">HSD</p>
                                                </div>
                                                <div class="text-end mt-2">
                                                    <button type="button" class="btn btn-sm btn-dark px-3 fw-bold rounded-pill btn-use-voucher">Dùng ngay</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </article>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                var reader = new FileReader();

                reader.onload = function(e) {
                    var dataUrl = e.target.result;
                    document.getElementById('avatarPreview').src = dataUrl;
                    document.getElementById('avatarPreview').removeAttribute('onerror');
                    
                    // Update all other avatar images on the screen (sidebar, header)
                    var userAvatars = document.querySelectorAll('.user-avatar, .rounded-circle.me-2');
                    userAvatars.forEach(function(img) {
                        if (img.tagName.toLowerCase() === 'img') {
                           img.src = dataUrl;
                           img.removeAttribute('onerror');
                        }
                    });
                }
                reader.readAsDataURL(file);

                // Auto-upload the avatar via AJAX
                const formData = new FormData();
                formData.append('avatarFile', file);
                
                // Add CSRF token for Spring Security
                const csrfTokenMeta = document.querySelector('meta[name="_csrf"]');
                const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');
                
                const headers = {};
                if (csrfTokenMeta && csrfHeaderMeta) {
                    headers[csrfHeaderMeta.content] = csrfTokenMeta.content;
                }

                fetch('/account/avatar/update', {
                    method: 'POST',
                    headers: headers,
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const Toast = Swal.mixin({
                            toast: true,
                            position: "top-end",
                            showConfirmButton: false,
                            timer: 3000,
                            timerProgressBar: true
                        });
                        Toast.fire({
                            icon: "success",
                            title: "Ảnh đại diện đã được cập nhật"
                        });
                    } else {
                        Swal.fire('Lỗi', data.message || 'Không thể cập nhật ảnh đại diện', 'error');
                    }
                })
                .catch(error => {
                    console.error('Error uploading avatar:', error);
                    Swal.fire('Lỗi', 'Đã xảy ra lỗi khi tải ảnh lên', 'error');
                });
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const btns = document.querySelectorAll('.btn-use-voucher');
            btns.forEach(btn => {
                btn.addEventListener('click', function() {
                    fetch('/api/cart/count')
                        .then(response => response.json())
                        .then(count => {
                            if (count > 0) {
                                window.location.href = '/cart';
                            } else {
                                Swal.fire({
                                    icon: 'info',
                                    title: 'Oops...',
                                    text: 'Giỏ hàng của bạn đang trống. Vui lòng thêm sản phẩm trước khi dùng Voucher!',
                                    confirmButtonColor: '#212529',
                                    confirmButtonText: 'Mua sắm ngay'
                                }).then((result) => {
                                    if (result.isConfirmed) {
                                        window.location.href = '/';
                                    }
                                });
                            }
                        })
                        .catch(error => {
                            console.error('Error:', error);
                        });
                });
            });
        });
    </script>
</body>
</html>
