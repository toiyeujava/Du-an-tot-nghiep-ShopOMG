<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: view(~{::title}, ~{::article})}">

<head>
    <title th:text="${pageTitle}">Cửa hàng - ShopOMG</title>
</head>

<body>
    <article class="container py-5">

        <style>
            .product-card:hover .quick-add-btn {
                opacity: 1 !important;
            }

            .cursor-pointer {
                cursor: pointer;
            }

            .color-dot {
                width: 25px;
                height: 25px;
                border-radius: 50%;
                display: inline-block;
                border: 1px solid #ddd;
                transition: transform 0.2s, border-color 0.2s;
                cursor: pointer;
            }

            .color-dot:hover,
            .color-dot.active {
                transform: scale(1.1);
                border-color: #000;
            }

            .filter-section {
                position: sticky;
                top: 80px;
                z-index: 900;
            }

            .transition-icon {
                transition: transform 0.3s ease;
                transform: rotate(0deg);
            }

            [data-bs-toggle="collapse"][aria-expanded="true"] .transition-icon {
                transform: rotate(180deg);
            }
        </style>

        <!-- Breadcrumb Navigation -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb" style="font-size: 0.9rem;">
                <li class="breadcrumb-item"><a href="/" class="text-dark text-decoration-none"><i
                            class="fas fa-home me-1"></i>Trang chủ</a></li>
                <li class="breadcrumb-item active" aria-current="page">Cửa hàng</li>
            </ol>
        </nav>

        <div class="row">
            <!-- ========== SIDEBAR FILTER (Home-style) ========== -->
            <aside class="col-lg-3 mb-4" id="shopSidebar">
                <div class="filter-section p-4 border rounded-3 bg-white shadow-sm" th:with="isFiltering=${(selectedGender != null and selectedGender != '') 
                                         or (selectedCategory != null) 
                                         or (selectedColor != null and selectedColor != '') 
                                         or (minPrice != null) 
                                         or (maxPrice != null) 
                                         or (isSale == true)}">

                    <div class="d-flex justify-content-between align-items-center" style="cursor: pointer;"
                        data-bs-toggle="collapse" data-bs-target="#shopFilterContent"
                        th:attr="aria-expanded=${isFiltering} ? 'true' : 'false'" aria-controls="shopFilterContent">
                        <h5 class="fw-bold mb-0 text-uppercase ls-1"><i class="fas fa-filter me-2"></i>Bộ lọc</h5>
                        <i class="fas fa-chevron-down transition-icon"></i>
                    </div>

                    <div class="collapse mt-4" id="shopFilterContent" th:classappend="${isFiltering} ? 'show'">
                        <!-- Gender -->
                        <div class="mb-4">
                            <h6 class="fw-bold mb-3 small text-uppercase text-muted">Đối tượng</h6>
                            <div class="list-group list-group-flush">
                                <a th:href="@{/products(gender='', category=${selectedCategory}, color=${selectedColor}, sale=${isSale}, min=${minPrice}, max=${maxPrice}, sort=${selectedSort})}"
                                    class="list-group-item list-group-item-action border-0 px-0 py-2"
                                    th:classappend="${selectedGender == null or selectedGender == ''} ? 'fw-bold text-dark' : 'text-secondary'">Tất
                                    cả</a>
                                <a th:href="@{/products(gender='Nam', category=${selectedCategory}, color=${selectedColor}, sale=${isSale}, min=${minPrice}, max=${maxPrice}, sort=${selectedSort})}"
                                    class="list-group-item list-group-item-action border-0 px-0 py-2"
                                    th:classappend="${selectedGender == 'Nam'} ? 'fw-bold text-dark' : 'text-secondary'">Nam</a>
                                <a th:href="@{/products(gender='Nữ', category=${selectedCategory}, color=${selectedColor}, sale=${isSale}, min=${minPrice}, max=${maxPrice}, sort=${selectedSort})}"
                                    class="list-group-item list-group-item-action border-0 px-0 py-2"
                                    th:classappend="${selectedGender == 'Nữ'} ? 'fw-bold text-dark' : 'text-secondary'">Nữ</a>
                                <a th:href="@{/products(gender='Unisex', category=${selectedCategory}, color=${selectedColor}, sale=${isSale}, min=${minPrice}, max=${maxPrice}, sort=${selectedSort})}"
                                    class="list-group-item list-group-item-action border-0 px-0 py-2"
                                    th:classappend="${selectedGender == 'Unisex'} ? 'fw-bold text-dark' : 'text-secondary'">Unisex</a>
                            </div>
                        </div>

                        <!-- Sale Button -->
                        <div class="mb-4">
                            <a th:href="@{/products(sale=${isSale == true ? false : true}, gender=${selectedGender}, category=${selectedCategory}, color=${selectedColor}, min=${minPrice}, max=${maxPrice}, sort=${selectedSort})}"
                                class="btn w-100 fw-bold py-2"
                                th:classappend="${isSale} ? 'btn-danger' : 'btn-outline-danger'"><i
                                    class="fas fa-fire me-2"></i>SĂN SALE SỐC</a>
                        </div>

                        <!-- Category -->
                        <div class="mb-4">
                            <h6 class="fw-bold mb-3 small text-uppercase text-muted">Danh mục</h6>
                            <div class="list-group list-group-flush" style="max-height: 600px; overflow-y: auto;">
                                <a th:href="@{/products(category='', gender=${selectedGender}, color=${selectedColor}, sale=${isSale}, min=${minPrice}, max=${maxPrice}, sort=${selectedSort})}"
                                    class="list-group-item list-group-item-action border-0 px-0 py-2"
                                    th:classappend="${selectedCategory == null} ? 'fw-bold text-dark' : 'text-secondary'">Tất
                                    cả</a>
                                <a th:each="cat : ${categories}"
                                    th:href="@{/products(category=${cat.id}, gender=${selectedGender}, color=${selectedColor}, sale=${isSale}, min=${minPrice}, max=${maxPrice}, sort=${selectedSort})}"
                                    class="list-group-item list-group-item-action border-0 px-0 py-2 d-flex justify-content-between align-items-center"
                                    th:classappend="${selectedCategory == cat.id} ? 'fw-bold text-dark' : 'text-secondary'">
                                    <span th:text="${cat.name}"></span>
                                    <span class="badge rounded-pill bg-light text-dark border"
                                        th:text="${cat.count}">0</span>
                                </a>
                            </div>
                        </div>

                        <!-- Price Range -->
                        <div class="mb-4">
                            <h6 class="fw-bold mb-3 small text-uppercase text-muted">Khoảng giá (đ)</h6>
                            <form id="shopPriceForm" onsubmit="return false;">
                                <input type="hidden" name="gender" th:value="${selectedGender}">
                                <input type="hidden" name="category" th:value="${selectedCategory}">
                                <input type="hidden" name="color" th:value="${selectedColor}">
                                <input type="hidden" name="sort" th:value="${selectedSort}">
                                <input type="hidden" name="sale" th:value="${isSale}">
                                <div class="d-flex align-items-center gap-2 mb-3">
                                    <input type="number" name="min" class="form-control form-control-sm"
                                        placeholder="Từ" th:value="${minPrice}">
                                    <span>-</span>
                                    <input type="number" name="max" class="form-control form-control-sm"
                                        placeholder="Đến" th:value="${maxPrice}">
                                </div>
                                <button type="button" class="btn btn-dark btn-sm w-100"
                                    onclick="shopAjaxPriceFilter()">Áp dụng</button>
                            </form>
                        </div>

                        <!-- Color -->
                        <div>
                            <h6 class="fw-bold mb-3 small text-uppercase text-muted">Màu sắc</h6>
                            <div class="d-flex flex-wrap gap-2">
                                <a th:href="@{/products(color='', gender=${selectedGender}, category=${selectedCategory}, sale=${isSale}, min=${minPrice}, max=${maxPrice}, sort=${selectedSort})}"
                                    class="btn btn-sm btn-outline-secondary px-2 py-0 d-flex align-items-center"
                                    style="height: 25px;"
                                    th:classappend="${selectedColor == null or selectedColor == ''} ? 'active bg-dark text-white' : ''">All</a>
                                <a th:href="@{/products(color='Đen', gender=${selectedGender}, category=${selectedCategory}, sale=${isSale}, min=${minPrice}, max=${maxPrice}, sort=${selectedSort})}"
                                    class="color-dot" style="background: #000;" title="Đen"
                                    th:classappend="${selectedColor == 'Đen'} ? 'border-primary border-2 active' : ''"></a>
                                <a th:href="@{/products(color='Trắng', gender=${selectedGender}, category=${selectedCategory}, sale=${isSale}, min=${minPrice}, max=${maxPrice}, sort=${selectedSort})}"
                                    class="color-dot" style="background: #fff;" title="Trắng"
                                    th:classappend="${selectedColor == 'Trắng'} ? 'border-primary border-2 active' : ''"></a>
                                <a th:href="@{/products(color='Đỏ', gender=${selectedGender}, category=${selectedCategory}, sale=${isSale}, min=${minPrice}, max=${maxPrice}, sort=${selectedSort})}"
                                    class="color-dot" style="background: red;" title="Đỏ"
                                    th:classappend="${selectedColor == 'Đỏ'} ? 'border-primary border-2 active' : ''"></a>
                                <a th:href="@{/products(color='Xanh', gender=${selectedGender}, category=${selectedCategory}, sale=${isSale}, min=${minPrice}, max=${maxPrice}, sort=${selectedSort})}"
                                    class="color-dot" style="background: blue;" title="Xanh"
                                    th:classappend="${selectedColor == 'Xanh'} ? 'border-primary border-2 active' : ''"></a>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- ========== PRODUCT GRID ========== -->
            <div class="col-lg-9">
                <div id="ajaxContent">
                    <div
                        class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm border">
                        <div class="mb-3 mb-md-0">
                            <h4 class="fw-bold mb-1">
                                <span th:if="${keyword != null and keyword != ''}"
                                    th:text="'Kết quả: ' + ${keyword}"></span>
                                <span th:unless="${keyword != null and keyword != ''}">Tất cả sản phẩm</span>
                            </h4>
                            <small class="text-muted" th:text="${products.totalElements} + ' sản phẩm tìm thấy'">0 sản
                                phẩm</small>
                        </div>
                        <div class="d-flex align-items-center">
                            <label class="me-2 text-nowrap small fw-bold text-muted">Sắp xếp theo:</label>
                            <select id="shopSortSelect" class="form-select form-select-sm border-0 bg-light fw-bold"
                                style="width: 160px; cursor: pointer;" onchange="shopAjaxSort(this.value)">
                                <option value="newest" th:selected="${selectedSort == 'newest'}">Mới nhất</option>
                                <option value="price_asc" th:selected="${selectedSort == 'price_asc'}">Giá tăng dần
                                </option>
                                <option value="price_desc" th:selected="${selectedSort == 'price_desc'}">Giá giảm dần
                                </option>
                                <option value="name_asc" th:selected="${selectedSort == 'name_asc'}">Tên A-Z</option>
                            </select>
                        </div>
                    </div>

                    <div th:if="${products.isEmpty()}" class="col-12 text-center py-5">
                        <div class="mb-3"><i class="fas fa-search fa-3x text-muted opacity-50"></i></div>
                        <h5 class="text-muted fw-bold">Không tìm thấy sản phẩm nào!</h5>
                        <p class="text-muted small">Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm.</p>
                    </div>

                    <div class="row row-cols-2 row-cols-md-3 g-4">
                        <div class="col" th:each="product : ${products.content}">
                            <div class="card product-card h-100 border-0 shadow-sm">
                                <div class="position-absolute top-0 end-0 bg-danger text-white px-2 py-1 m-2 rounded small fw-bold"
                                    th:if="${product.discount > 0}" th:text="'-' + ${product.discount} + '%'">
                                </div>
                                <div class="img-wrapper position-relative overflow-hidden">
                                    <a th:href="@{/product/{slug}(slug=${product.slug})}">
                                        <img th:src="${product.image}" class="card-img-top"
                                            style="height: 250px; object-fit: cover;"
                                            onerror="this.src='https://placehold.co/600x400?text=No+Image'">
                                    </a>
                                    <form th:action="@{/cart/add}" method="post"
                                        class="quick-add-btn position-absolute bottom-0 start-0 w-100 text-center bg-dark text-white py-2 opacity-0"
                                        style="transition: 0.3s;">
                                        <input type="hidden" name="productId" th:value="${product.id}">
                                        <input type="hidden" name="quantity" value="1">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit"
                                            class="btn btn-link text-white text-decoration-none w-100 p-0">
                                            <i class="fas fa-cart-plus me-2"></i>Thêm vào giỏ
                                        </button>
                                    </form>
                                </div>
                                <div class="card-body text-center">
                                    <h6 class="card-title fw-bold text-truncate">
                                        <a th:href="@{/product/{slug}(slug=${product.slug})}"
                                            class="text-dark text-decoration-none" th:text="${product.name}"></a>
                                    </h6>
                                    <div class="fw-bold text-danger">
                                        <span
                                            th:text="${#numbers.formatDecimal(product.price * (100 - (product.discount != null ? product.discount : 0)) / 100, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                        <small class="text-muted text-decoration-line-through fw-normal ms-1"
                                            th:if="${product.discount > 0}"
                                            th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <nav class="mt-5 d-flex justify-content-center" th:if="${products.totalPages > 1}">
                        <ul class="pagination">
                            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                                <a class="page-link text-dark"
                                    th:href="@{/products(page=${products.number - 1}, gender=${selectedGender}, category=${selectedCategory}, color=${selectedColor}, sort=${selectedSort}, min=${minPrice}, max=${maxPrice}, sale=${isSale})}">«</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                                th:classappend="${i == products.number} ? 'active'">
                                <a class="page-link"
                                    th:href="@{/products(page=${i}, gender=${selectedGender}, category=${selectedCategory}, color=${selectedColor}, sort=${selectedSort}, min=${minPrice}, max=${maxPrice}, sale=${isSale})}"
                                    th:text="${i + 1}"
                                    th:classappend="${i == products.number} ? 'bg-dark border-dark text-white' : 'text-dark'"></a>
                            </li>
                            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                                <a class="page-link text-dark"
                                    th:href="@{/products(page=${products.number + 1}, gender=${selectedGender}, category=${selectedCategory}, color=${selectedColor}, sort=${selectedSort}, min=${minPrice}, max=${maxPrice}, sale=${isSale})}">»</a>
                            </li>
                        </ul>
                    </nav>
                </div><!-- end #ajaxContent -->
            </div>
        </div>
    </article>

    <script>
        // ===== CLEAN URL ON PAGE LOAD (prevents flicker) =====
        history.replaceState({}, '', '/products');

        function shopAjaxFetch(url) {
            var content = document.getElementById('ajaxContent');
            if (!content) return;
            content.style.opacity = '0.5';
            content.style.pointerEvents = 'none';

            const csrfToken = document.querySelector("meta[name='_csrf']")?.getAttribute("content");
            const csrfHeader = document.querySelector("meta[name='_csrf_header']")?.getAttribute("content");

            fetch(url, { 
                headers: { 
                    'X-Requested-With': 'XMLHttpRequest',
                    ...(csrfHeader && csrfToken ? { [csrfHeader]: csrfToken } : {})
                } 
            })
                .then(function (r) { return r.text(); })
                .then(function (html) {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, 'text/html');
                    var newContent = doc.getElementById('ajaxContent');
                    if (newContent) {
                        content.innerHTML = newContent.innerHTML;
                    }
                    // Also update sidebar filter state (active styles)
                    var newSidebar = doc.getElementById('shopSidebar');
                    var curSidebar = document.getElementById('shopSidebar');
                    if (newSidebar && curSidebar) {
                        curSidebar.innerHTML = newSidebar.innerHTML;
                    }
                    history.replaceState({}, '', '/products');
                    shopBindPagination();
                    shopBindSort();
                })
                .catch(function (err) { console.error('Shop filter error:', err); })
                .finally(function () {
                    content.style.opacity = '1';
                    content.style.pointerEvents = 'auto';
                });
        }

        // ===== SIDEBAR EVENT DELEGATION (intercept all filter link clicks) =====
        (function () {
            var sidebar = document.getElementById('shopSidebar');
            if (!sidebar) return;
            sidebar.addEventListener('click', function (e) {
                var link = e.target.closest('a[href*="/products"]');
                if (!link) return;
                var href = link.getAttribute('href');
                if (!href || !href.startsWith('/products')) return;
                e.preventDefault();
                shopAjaxFetch(href);
            });
        })();

        // ===== SORT HANDLER =====
        function shopAjaxSort(sortVal) {
            var priceForm = document.getElementById('shopPriceForm');
            var params = new URLSearchParams();
            params.set('sort', sortVal);
            if (priceForm) {
                priceForm.querySelectorAll('input[name]').forEach(function (inp) {
                    if (inp.value && inp.value !== 'false') params.set(inp.name, inp.value);
                });
            }
            shopAjaxFetch('/products?' + params.toString());
        }

        // ===== PRICE FILTER HANDLER =====
        function shopAjaxPriceFilter() {
            var priceForm = document.getElementById('shopPriceForm');
            if (!priceForm) return;
            var params = new URLSearchParams();
            priceForm.querySelectorAll('input[name]').forEach(function (inp) {
                if (inp.value) params.set(inp.name, inp.value);
            });
            var sortSel = document.getElementById('shopSortSelect');
            if (sortSel) params.set('sort', sortSel.value);
            shopAjaxFetch('/products?' + params.toString());
        }

        // ===== PAGINATION INTERCEPTION =====
        function shopBindPagination() {
            document.querySelectorAll('#ajaxContent .pagination a.page-link').forEach(function (link) {
                link.addEventListener('click', function (e) {
                    e.preventDefault();
                    var href = this.getAttribute('href');
                    if (href) shopAjaxFetch(href);
                });
            });
        }

        // ===== SORT RE-BINDING AFTER AJAX =====
        function shopBindSort() {
            var sortSel = document.querySelector('#ajaxContent select');
            if (sortSel) {
                sortSel.onchange = function () { shopAjaxSort(this.value); };
            }
        }

        // ===== INIT ON LOAD =====
        document.addEventListener('DOMContentLoaded', function () {
            shopBindPagination();
        });
    </script>
</body>

</html>
